{% extends "layout.html" %} {% block title %} Log in {% endblock %} {% block
main %}

<h1 class="mb-5 text-center">Log in</h1>

<form action="/login" method="post">

  <!-- Inputs -->
  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      autofocus
      class="input form-control mx-auto"
      name="username"
      placeholder="Username"
      type="text"
      required
    />
  </div>

  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      class="input form-control mx-auto"
      name="password"
      placeholder="Password"
      type="password"
      required
    />
  </div>

  <!-- Submit button -->
  <button class="btn btn-primary col-3" type="submit">Log in</button>
</form>

{% endblock %}
