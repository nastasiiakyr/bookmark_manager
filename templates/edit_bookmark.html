{% extends "layout.html" %} {% block title %} Edit Bookmark {% endblock %} {%
block main %}

<h1 class="mb-4 text-center">Edit bookmark</h1>

<form action="/edit-bookmark" method="post">
  <!-- Input for getting bookmark id -->
  <input type="hidden" name="id" value="{{ bookmark.id }}" />

  <div class="mb-2 col-3">
    <!-- Inputs with prefilled data -->
    <input
      autocomplete="off"
      autofocus
      class="input form-control mx-auto"
      name="name"
      placeholder="New Bookmark Name"
      value="{{ bookmark.name }}"
      type="text"
      maxlength="50"
      required
    />
  </div>

  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      class="input form-control mx-auto"
      name="url"
      placeholder="New Bookmark URL"
      value="{{ bookmark.url }}"
      type="url"
      required
    />
  </div>

  <div class="mb-2 col-3">
    <label class="form-label">Select Tags</label>

    {% if not tags %}
    <label class="form-check-label text-left">
      You don't have created tags. Create a new one in Tag settings
    </label>
    {% endif %} 
    
    {% for tag in tags %}
    <div class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        name="tags"
        value="{{ tag.id }}"
        id="tag{{ tag.id }}"
        {%
        if
        tag.id
        in
        bookmark_tags
        %}checked{%
        endif
        %}
      />

      <label class="form-check-label text-left" for="tag{{ tag.id }}">
        {{ tag.name }}
      </label>
    </div>
    {% endfor %}
  </div>

  <div class="mb-2 col-3">
    <select class="input form-select mx-auto" name="cost">
      <option value="" disabled {% if not bookmark.cost %} selected {% endif%}>
        Select cost type
      </option>
      {% for cost in costs %}

      <option
        value="{{ cost }}"
        {%
        if
        cost==bookmark.cost
        %}
        selected
        {%
        endif%}
      >
        {{ cost }}
      </option>

      {% endfor %}
    </select>
  </div>

  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      class="input form-control mx-auto"
      name="description"
      placeholder="Description (optional)"
      value="{{ bookmark.description }}"
      type="text"
      maxlength="200"
    />
  </div>

  <div class="mb-3 col-3">
    <input
      autocomplete="off"
      class="input form-control mx-auto"
      name="favicon"
      placeholder="Favicon URL (optional)"
      value="{{ bookmark.favicon }}"
      type="url"
    />
  </div>

  <!-- Submit button -->
  <button class="btn btn-primary col-3" type="submit">Save changes</button>
</form>

{% endblock %}
