{% extends "layout.html" %} {% block title %}Tag settings{% endblock %} {% block
main %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="mb-0">Tags</h1>

  <a href="/create-tag" class="btn btn-primary"> + Create tag </a>
</div>

<!-- Tags table -->

<table class="table table-hover align-middle">
  <thead>
    <tr>
      <th>Color</th>

      <th class="text-start">Name</th>

      <th></th>
    </tr>
  </thead>

  <tbody>
    {% if not tags %}
    <tr>
      <td colspan="4" class="text-center">No tags found</td>
    </tr>

    {% else %} {% for tag in tags %}

    <tr>
      <td>
        <span
          class="tag-circle"
          style="background-color: {{ colors[tag.color] }};"
        ></span>
      </td>

      <td class="text-start">{{ tag.name }}</td>

      <td class="text-end text-nowrap">
        <div class="d-inline-flex gap-2">
          <a
            href="/edit-tag?id={{ tag.id }}"
            class="btn btn-sm btn-outline-secondary"
          >
            Edit
          </a>

          <form method="post" action="/delete-tag" class="m-0">
            <input type="hidden" name="id" value="{{ tag.id }}" />

            <button type="submit" class="btn btn-sm btn-outline-danger">
              Delete
            </button>
          </form>
        </div>
      </td>
    </tr>

    {% endfor %}
  </tbody>
  {% endif %}
</table>

{% endblock %}
