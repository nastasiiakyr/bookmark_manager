{% extends "layout.html" %} {% block title %} Change Password {% endblock %} {%
block main %}

<h1 class="mb-5">Change Password</h1>

<form action="/password" method="post">
  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      autofocus
      class="form-control mx-auto"
      name="old_password"
      placeholder="Current password"
      type="password"
    />
  </div>

  <div class="mb-2 col-3">
    <input
      autocomplete="off"
      class="form-control mx-auto"
      name="new_password"
      placeholder="New password"
      type="password"
    />
  </div>

  <div class="mb-3 col-3">
    <input
      autocomplete="off"
      class="form-control mx-auto"
      name="new_confirmation"
      placeholder="New password confirmation"
      type="password"
    />
  </div>

  <button class="btn btn-primary col-3" type="submit">Change Password</button>
</form>

{% endblock %}
